      <p> The study demonstrates a notable and consistent reduction in the functional diversity of targeted apex sharks,
        including great white sharks (Carcharodon carcharias), tiger sharks (Galeocerdo cuvier), and several large
        species of the Carcharhinidae family (requiem sharks).
        These species are classified as apex sharks and are targeted by the Queensland Shark Control Program due to the
        risks they pose to swimmers.

      </p>
      <p>This has been the case in the coastal oceans of eastern Australia over a period of six decades. The data were
        obtained from the QSCP, which has used gillnets and baited hooks since 1962 for the purpose of catching sharks
        along the 80 beaches in question. The use of gillnets was found to result in the capture of a greater diversity
        of targeted apex sharks, indicating that the majority of observed functional declines were attributable to this
        method of fishing. Concurrently, there was an increase in the functional diversity of non-target inshore fish.
        The decline in functional diversity among targeted apex sharks is associated with a reduction in carrion
        consumption, which plays a crucial role in the ecological function of these species. The evidence of this
        ecosystem disturbance is manifest in a notable alteration in the composition of the shark community,
        characterised by a decline in species that are the focus of the QSCP and an increase in non-targeted species.
      </p>
      <p>The decline in functional diversity among apex sharks is linked to a reduction in the consumption of carrion,
        which plays a central role in the system by preventing the proliferation of bacteria. This consequently results
        in an imbalance within the ecosystem. There has been a notable shift in the composition of the shark community,
        with a decline in the species targeted by the QSCP and an increase in non-target species. The long-term decline
        in the functional diversity of apex sharks has significant implications for the structure and functioning of
        coastal ecosystems. Consequently, the disappearance of these predators can result in anthropogenic trophic
        cascades, which, in turn, affect the structure and functioning of coastal ecosystems. These changes have
        important implications for the conservation and management of coastal ecosystems, including fishing, carbon
        storage, coastal protection, and so forth.</p>
      <p>In conclusion, the long-term decline in apex shark functional diversity has considerable consequences for the
        state of coastal ecosystems and essential ecosystem resources in eastern Australia. Consequently, the
        restoration of shark populations is vital for the stability of coastal ecosystems.</p>
